version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pricewise
      POSTGRES_USER: pricewise
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pricewise"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Server
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://pricewise:${DB_PASSWORD:-changeme}@db:5432/pricewise
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-random-64-char-string}
      JWT_EXPIRY: 8h
      API_PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    ports:
      - "3000:3000"

  # Scraper
  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://pricewise:${DB_PASSWORD:-changeme}@db:5432/pricewise
      SCRAPE_DELAY_MIN: 1500
      SCRAPE_DELAY_MAX: 4000
      MAX_PAGES_PER_CATEGORY: 50
      LOG_LEVEL: info
      SCRAPER_PORT: 3001
      SCHEDULE_HOURS: "3,15"
    ports:
      - "3001:3001"

  # Nginx (reverse proxy + static files)
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
      - scraper
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./dist:/usr/share/nginx/html:ro
      # Uncomment for SSL:
      # - ./ssl/cert.pem:/etc/nginx/ssl/cert.pem:ro
      # - ./ssl/key.pem:/etc/nginx/ssl/key.pem:ro

volumes:
  pgdata:
